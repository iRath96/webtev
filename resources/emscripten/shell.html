<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tev — The EDR Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #333; }
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
            outline: none;
        }
        #status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
            font-size: 16px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        #progress {
            width: 300px;
            height: 4px;
            background: #555;
            margin: 12px auto 0;
            border-radius: 2px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background: #7a7ae0;
            width: 0%;
            transition: width 0.2s;
        }
        .loaded #status { display: none; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <div id="status">
        <div>Loading tev...</div>
        <div id="progress"><div id="progress-bar"></div></div>
    </div>

    <script>
        /* ── Session ID management ────────────────────────────── */
        (function() {
            var id = location.hash.slice(1);
            if (!id || !/^[a-zA-Z0-9_-]{1,64}$/.test(id)) {
                id = Math.random().toString(36).substr(2, 9);
                location.hash = '#' + id;
            }
            window.tevSessionId = id;
            window.addEventListener('hashchange', function() { location.reload(); });
        })();

        /* ── Helpers ─────────────────────────────────────────── */
        function generateFileId() {
            var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            var id = '';
            for (var i = 0; i < 10; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        /* ── Emscripten Module setup ──────────────────────────── */
        var Module = {
            canvas: (function() { return document.getElementById('canvas'); })(),
            setStatus: function(text) {
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var progressBar = document.getElementById('progress-bar');
                if (m) {
                    progressBar.style.width = (parseInt(m[2]) * 100 / parseInt(m[4])) + '%';
                } else if (text === '') {
                    document.body.classList.add('loaded');
                }
                var statusEl = document.getElementById('status');
                if (statusEl) statusEl.firstElementChild.textContent = text || 'Loading tev...';
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : '');
            }
        };
        Module.setStatus('Downloading...');
        window.onerror = function() {
            Module.setStatus('Exception thrown, see JavaScript console');
        };

        /* ── Collaborative sync module ────────────────────────── */
        var TevSync = {
            ws: null,
            sessionId: window.tevSessionId,

            /* File transfer */
            uploadQueue: [],
            downloadQueue: [],
            activeUploads: 0,
            activeDownloads: 0,
            activeDownloadIds: new Set(),
            knownFileIds: new Set(),
            fileIdToVfsPath: {},
            vfsPathToFileId: {},
            selectedFileId: null,
            MAX_CONCURRENT: 2,
            reconnectDelay: 1000,

            /* State sync */
            inflightStateId: null,
            lastStateJson: null,
            nextValidSendTime: 0,
            stateSendTimer: null,
            statePoller: null,
            suppressUntil: 0,
            pendingRemoteState: null,
            DEBOUNCE_MS: 250,
            STATE_POLL_MS: 100,

            /* Cursor sync */
            clientId: generateFileId(),

            connect: function() {
                var self = this;
                var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
                self.ws = new WebSocket(protocol + '//' + location.host);

                self.ws.onopen = function() {
                    self.reconnectDelay = 1000;
                    self.inflightStateId = null;
                    self.lastStateJson = null;
                    self.ws.send(JSON.stringify({
                        type: 'join',
                        sessionId: self.sessionId
                    }));
                };

                self.ws.onmessage = function(ev) {
                    var msg;
                    try { msg = JSON.parse(ev.data); } catch (_) { return; }

                    if (msg.type === 'ui_state') {
                        self.handleRemoteState(msg);
                    } else if (msg.type === 'cursor') {
                        self.handleRemoteCursor(msg);
                    }
                };

                self.ws.onclose = function() {
                    setTimeout(function() {
                        self.reconnectDelay = Math.min(self.reconnectDelay * 2, 30000);
                        self.connect();
                    }, self.reconnectDelay);
                };

                self.ws.onerror = function() { self.ws.close(); };
            },

            /* ── State sync methods ──────────────────────────────── */

            handleRemoteState: function(msg) {
                /* Echo of our own state — just clear inflight */
                if (msg.stateId && msg.stateId === this.inflightStateId) {
                    this.inflightStateId = null;
                    return;
                }
                /* Waiting for our echo — ignore remote states */
                if (this.inflightStateId !== null) return;
                if (!msg.state) return;

                var state = msg.state;
                this.pendingRemoteState = state;
                this.reconcileFiles(state.files || []);
                this.applyRemoteState(state);
            },

            applyRemoteState: function(state) {
                var self = this;
                var stateForCpp = {};
                for (var key in state) {
                    if (key !== 'files') stateForCpp[key] = state[key];
                }

                /* Reconstruct imagePaths from files using local VFS paths */
                if (state.files) {
                    var localPaths = [];
                    state.files.forEach(function(f) {
                        var localPath = self.fileIdToVfsPath[f.id];
                        if (localPath) localPaths.push(localPath);
                    });
                    stateForCpp.imagePaths = localPaths;
                }

                /* Map selectedImage/referenceImage file IDs back to local VFS paths */
                if (stateForCpp.selectedImage) {
                    var localPath = self.fileIdToVfsPath[stateForCpp.selectedImage];
                    stateForCpp.selectedImage = localPath || null;
                }
                if (stateForCpp.referenceImage) {
                    var localPath = self.fileIdToVfsPath[stateForCpp.referenceImage];
                    stateForCpp.referenceImage = localPath || null;
                }

                Module.ccall('tev_apply_ui_state', null, ['string'],
                    [JSON.stringify(stateForCpp)]);
                this.suppressUntil = Date.now() + 500;
                this.lastStateJson = null;
            },

            reconcileFiles: function(remoteFiles) {
                var self = this;

                /* Build set of remote file IDs */
                var remoteFileIds = new Set();
                remoteFiles.forEach(function(f) { remoteFileIds.add(f.id); });

                /* Queue downloads for files we don't have locally */
                remoteFiles.forEach(function(f) {
                    if (!self.knownFileIds.has(f.id) && !self.activeDownloadIds.has(f.id)) {
                        var inQueue = self.downloadQueue.some(function(d) {
                            return d.id === f.id;
                        });
                        if (!inQueue) {
                            var filename = f.name.split('/').pop();
                            self.downloadQueue.push({ id: f.id, filename: filename });
                        }
                    }
                });
                self.processDownloadQueue();

                /* Remove files loaded locally but absent from remote state.
                   tev_remove_image -> removeImageByPath suppresses tevOnImageRemoved,
                   so we clean up JS-side mappings here directly. */
                var toRemove = [];
                self.knownFileIds.forEach(function(id) {
                    if (!remoteFileIds.has(id)) toRemove.push(id);
                });
                toRemove.forEach(function(id) {
                    var vfsPath = self.fileIdToVfsPath[id];
                    if (vfsPath) {
                        Module.ccall('tev_remove_image', null, ['string'], [vfsPath]);
                        try { FS.unlink(vfsPath); } catch (_) {}
                        delete self.vfsPathToFileId[vfsPath];
                        delete self.fileIdToVfsPath[id];
                    }
                    self.knownFileIds.delete(id);
                    self.downloadQueue = self.downloadQueue.filter(function(d) {
                        return d.id !== id;
                    });
                });
            },

            startStateSync: function() {
                var self = this;
                self.statePoller = setInterval(function() {
                    if (!self.ws || self.ws.readyState !== 1) return;

                    /* Don't broadcast state while downloads are in progress —
                       local state is incomplete and would overwrite correct
                       server state (e.g. captions, selection) with defaults */
                    if (self.activeDownloads > 0 || self.downloadQueue.length > 0) return;

                    var stateJson = Module.ccall('tev_get_ui_state', 'string', [], []);

                    /* During suppression, just keep baseline updated */
                    if (Date.now() < self.suppressUntil) {
                        self.lastStateJson = stateJson;
                        return;
                    }

                    if (self.lastStateJson === null) {
                        /* First read — record baseline, don't send */
                        self.lastStateJson = stateJson;
                        return;
                    }

                    if (stateJson === self.lastStateJson) return;

                    self.inflightStateId = generateFileId();
                    self.lastStateJson = stateJson;

                    if (self.stateSendTimer) return;
                    
                    const timeNow = new Date().getTime();
                    const timeDelta = Math.max(self.nextValidSendTime - timeNow, 0);
                    self.nextValidSendTime = timeNow + self.DEBOUNCE_MS;
                    self.stateSendTimer = setTimeout(function() {
                        self.stateSendTimer = null;
                        self.sendState();
                    }, timeDelta);
                }, self.STATE_POLL_MS);
            },

            sendState: function() {
                var self = this;
                if (!self.ws || self.ws.readyState !== 1) return;

                var stateJson = self.lastStateJson;
                var state;
                try { state = JSON.parse(stateJson); } catch (_) { return; }

                /* Transform imagePaths into files array with server IDs */
                var files = [];
                (state.imagePaths || []).forEach(function(p) {
                    var id = self.vfsPathToFileId[p];
                    if (id) files.push({ name: p, id: id });
                });
                delete state.imagePaths;
                state.files = files;

                /* Map selectedImage/referenceImage VFS paths to file IDs */
                if (state.selectedImage) {
                    var selId = self.vfsPathToFileId[state.selectedImage];
                    state.selectedImage = selId || null;
                }
                if (state.referenceImage) {
                    var refId = self.vfsPathToFileId[state.referenceImage];
                    state.referenceImage = refId || null;
                }

                /* Only clear pending remote state once all downloads are done —
                   otherwise captions/selection from the remote state are lost */
                if (self.activeDownloads === 0 && self.downloadQueue.length === 0) {
                    self.pendingRemoteState = null;
                }

                self.ws.send(JSON.stringify({
                    type: 'ui_state',
                    stateId: self.inflightStateId,
                    state: state
                }));
            },

            /* ── Cursor sync ────────────────────────────────────── */

            sendCursor: function(screenX, screenY) {
                var self = this;
                if (!self.ws || self.ws.readyState !== 1) return;

                var sidebarW = Module.ccall('tev_get_sidebar_width', 'number', [], []);
                var msg = { type: 'cursor', clientId: self.clientId };

                if (screenX < sidebarW) {
                    msg.region = 'sidebar';
                    msg.x = screenX;
                    msg.y = screenY;
                } else {
                    var relX = screenX - sidebarW;
                    var relY = screenY;
                    var coordsJson = Module.ccall('tev_get_cursor_image_coords', 'string',
                        ['number', 'number'], [relX, relY]);
                    if (coordsJson !== 'null') {
                        var coords = JSON.parse(coordsJson);
                        msg.region = 'image';
                        msg.imageX = coords[0];
                        msg.imageY = coords[1];
                    } else {
                        msg.region = 'sidebar';
                        msg.x = screenX;
                        msg.y = screenY;
                    }
                }

                self.ws.send(JSON.stringify(msg));
            },

            handleRemoteCursor: function(msg) {
                Module.ccall('tev_set_remote_cursor', null,
                    ['string', 'number', 'number', 'number', 'number', 'number'],
                    [msg.clientId,
                     msg.region === 'sidebar' ? 1 : 0,
                     msg.x || 0, msg.y || 0,
                     msg.imageX || 0, msg.imageY || 0]);
            },

            /* ── File upload / download ──────────────────────────── */

            enqueueUpload: function(id, filename, vfsPath, data) {
                this.knownFileIds.add(id);
                this.fileIdToVfsPath[id] = vfsPath;
                this.vfsPathToFileId[vfsPath] = id;
                this.uploadQueue.push({ id: id, filename: filename, vfsPath: vfsPath, data: data });
                this.processUploadQueue();
            },

            processUploadQueue: function() {
                while (this.activeUploads < this.MAX_CONCURRENT && this.uploadQueue.length > 0) {
                    this.activeUploads++;
                    this.uploadFile(this.uploadQueue.shift());
                }
            },

            uploadFile: function(item) {
                var self = this;
                var xhr = new XMLHttpRequest();
                var url = '/api/sessions/' + encodeURIComponent(self.sessionId) +
                          '/files/' + encodeURIComponent(item.id) +
                          '?filename=' + encodeURIComponent(item.filename);
                xhr.open('POST', url);
                xhr.setRequestHeader('Content-Type', 'application/octet-stream');

                xhr.upload.onprogress = function(e) {
                    if (e.lengthComputable) {
                        Module.ccall('tev_set_transfer_progress', null,
                            ['string', 'number', 'number'],
                            [item.vfsPath, Math.round((e.loaded / e.total) * 100), 1]);
                    }
                };

                xhr.onload = function() {
                    Module.ccall('tev_clear_transfer_progress', null,
                        ['string'], [item.vfsPath]);
                    self.activeUploads--;
                    /* No file_available WS message — state sync propagates the new file */
                    self.processUploadQueue();
                };

                xhr.onerror = function() {
                    Module.ccall('tev_clear_transfer_progress', null,
                        ['string'], [item.vfsPath]);
                    self.activeUploads--;
                    self.uploadQueue.push(item);
                    setTimeout(function() { self.processUploadQueue(); }, 3000);
                };

                xhr.send(item.data);
            },

            processDownloadQueue: function() {
                if (this.selectedFileId) {
                    var sel = this.selectedFileId;
                    this.downloadQueue.sort(function(a, b) {
                        return (a.id === sel ? 0 : 1) - (b.id === sel ? 0 : 1);
                    });
                }

                while (this.activeDownloads < this.MAX_CONCURRENT && this.downloadQueue.length > 0) {
                    var idx = -1;
                    for (var i = 0; i < this.downloadQueue.length; i++) {
                        if (!this.activeDownloadIds.has(this.downloadQueue[i].id)) {
                            idx = i;
                            break;
                        }
                    }
                    if (idx === -1) break;

                    var item = this.downloadQueue.splice(idx, 1)[0];
                    this.activeDownloads++;
                    this.activeDownloadIds.add(item.id);
                    this.downloadFile(item);
                }
            },

            downloadFile: function(item) {
                var self = this;
                var xhr = new XMLHttpRequest();
                var url = '/api/sessions/' + encodeURIComponent(self.sessionId) +
                          '/files/' + encodeURIComponent(item.id);
                xhr.open('GET', url);
                xhr.responseType = 'arraybuffer';

                var vfsDir = '/.glfw_dropped_files/' + item.id;
                var vfsPath = vfsDir + '/' + item.filename;

                xhr.onprogress = function(e) {
                    if (e.lengthComputable) {
                        Module.ccall('tev_set_transfer_progress', null,
                            ['string', 'number', 'number'],
                            [vfsPath, Math.round((e.loaded / e.total) * 100), 0]);
                    }
                };

                xhr.onload = function() {
                    self.activeDownloads--;
                    self.activeDownloadIds.delete(item.id);

                    if (xhr.status === 200) {
                        FS.createPath('/', '.glfw_dropped_files');
                        FS.createPath('/.glfw_dropped_files', item.id);
                        FS.writeFile(vfsPath, new Uint8Array(xhr.response));
                        self.knownFileIds.add(item.id);
                        self.fileIdToVfsPath[item.id] = vfsPath;
                        self.vfsPathToFileId[vfsPath] = item.id;

                        Module.ccall('tev_drop_files', null, ['string'], [vfsPath]);
                        setTimeout(function() {
                            Module.ccall('tev_clear_transfer_progress', null,
                                ['string'], [vfsPath]);
                        }, 500);

                        /* Re-apply pending remote state so image selection/reference
                           work correctly after the download completes */
                        if (self.pendingRemoteState) {
                            setTimeout(function() {
                                self.applyRemoteState(self.pendingRemoteState);
                            }, 200);
                        }
                    } else {
                        Module.ccall('tev_clear_transfer_progress', null,
                            ['string'], [vfsPath]);
                    }

                    self.processDownloadQueue();
                };

                xhr.onerror = function() {
                    Module.ccall('tev_clear_transfer_progress', null,
                        ['string'], [vfsPath]);
                    self.activeDownloads--;
                    self.activeDownloadIds.delete(item.id);
                    self.downloadQueue.push(item);
                    setTimeout(function() { self.processDownloadQueue(); }, 3000);
                };

                xhr.send();
            }
        };

        /* ── C++ callbacks ───────────────────────────────────── */

        /* Called from C++ when the selected image changes */
        window.tevOnImageSelected = function(vfsPath) {
            var id = TevSync.vfsPathToFileId[vfsPath];
            TevSync.selectedFileId = id || null;
            TevSync.processDownloadQueue();
        };

        /* Called from C++ when user closes an image through the tev UI.
           NOT called for tev_remove_image (removeImageByPath suppresses it). */
        window.tevOnImageRemoved = function(vfsPath) {
            var id = TevSync.vfsPathToFileId[vfsPath];
            if (!id) return;

            TevSync.knownFileIds.delete(id);
            delete TevSync.fileIdToVfsPath[id];
            delete TevSync.vfsPathToFileId[vfsPath];

            /* Delete file from server */
            var xhr = new XMLHttpRequest();
            var url = '/api/sessions/' + encodeURIComponent(TevSync.sessionId) +
                      '/files/' + encodeURIComponent(id);
            xhr.open('DELETE', url);
            xhr.send();
            /* State sync will propagate the removal — no WS message needed */
        };

        /* ── Start sync after WASM is ready ──────────────────── */
        Module.postRun = Module.postRun || [];
        Module.postRun.push(function() {
            TevSync.connect();
            TevSync.startStateSync();
        });

        /* ── Cursor tracking ──────────────────────────────────── */
        // Poll cursor position from emscripten's Browser object every 50ms.
        // Event listeners don't work reliably with emscripten's GLFW event handling.
        (function() {
            var lastX = -1, lastY = -1;
            setInterval(function() {
                if (typeof Browser === 'undefined' || typeof TevSync === 'undefined') return;
                var x = Browser.mouseX, y = Browser.mouseY;
                if (x !== lastX || y !== lastY) {
                    lastX = x; lastY = y;
                    TevSync.sendCursor(x, y);
                }
            }, 50);
        })();

        /* ── Custom drop handler ──────────────────────────────── */
        (function() {
            var canvas = document.getElementById('canvas');
            var DROP_DIR = '/.glfw_dropped_files';

            canvas.addEventListener('dragover', function(e) {
                e.preventDefault();
            }, true);

            canvas.addEventListener('drop', function(e) {
                e.preventDefault();
                e.stopImmediatePropagation();

                var files = e.dataTransfer ? e.dataTransfer.files : null;
                if (!files || !files.length) return;

                var entries = [];
                for (var i = 0; i < files.length; i++) {
                    var origName = files[i].name.replace(/\//g, '_');
                    var id = generateFileId();
                    entries.push({ file: files[i], id: id, filename: origName,
                                   path: DROP_DIR + '/' + id + '/' + origName });
                }

                var pending = entries.length;
                var paths = entries.map(function(e) { return e.path; });

                FS.createPath('/', '.glfw_dropped_files');

                entries.forEach(function(entry) {
                    FS.createPath(DROP_DIR, entry.id);

                    var reader = new FileReader();
                    reader.onloadend = function() {
                        if (reader.readyState === 2) {
                            var data = new Uint8Array(reader.result);
                            FS.writeFile(entry.path, data);
                            TevSync.enqueueUpload(entry.id, entry.filename, entry.path, reader.result);
                        }
                        if (--pending === 0) {
                            Module.ccall('tev_drop_files', null, ['string'], [paths.join('\n')]);
                        }
                    };
                    reader.readAsArrayBuffer(entry.file);
                });
            }, true);
        })();
    </script>
    {{{ SCRIPT }}}
</body>
</html>
